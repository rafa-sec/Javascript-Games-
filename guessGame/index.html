<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mainText">
        <h1>Guess Game</h1>
        <h2>Guess who am I</h2>
    </div>

    <div class="mysteriousMan">
        <img id="image" src="./img/mysteriousMan.jpg" alt="Guess who am I!">
    </div>

    <div class="tipSection">
    <p id="tipCount"></p>
    <button id="tipBtn">I want a tip!</button>
    <h3 id="tip"></h3>
    </div>


    <div class="inputSection">
    <input type="text" placeholder="Write here who it is" id="inputAnswer">
    <button id="inputBtn">Submit</button>
    </div>
    
</body>

<script src="script.js"></script>
</html>
